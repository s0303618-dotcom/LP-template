    <g id="グループ_545" data-name="グループ 545" transform="translate(480)">
      <g id="グループ_614" data-name="グループ 614">
        <text id="バーチャルMRやeディテーリングが便利で_短時間の動画でサクッと要点をつかめます_忙しい診療の合間でも_有益な情報が効率よく得られるのが良いですね_" data-name="バーチャルMRやeディテーリングが便利で、短時間の動画でサクッと要点をつかめます。忙しい診療の合間でも、有益な情報が効率よく得られるのが良いですね。" transform="translate(466 10364)" fill="#1a1a1a" font-size="16" font-family="HiraginoSans-W6, Hiragino Sans" letter-spacing="0.05em"><tspan x="0" y="14">バーチャル</tspan><tspan y="14" font-family="Helvetica-Bold, Helvetica" font-weight="700">MR</tspan><tspan y="14" font-family="HiraginoSans-W3, Hiragino Sans">や</tspan><tspan y="14" font-family="Helvetica-Bold, Helvetica" font-weight="700">e</tspan><tspan y="14">ディテーリング</tspan><tspan y="14" font-family="HiraginoSans-W3, Hiragino Sans">が便利</tspan><tspan x="0" y="46" font-family="HiraginoSans-W3, Hiragino Sans">で、短時間の動画でサクッと要点をつか</tspan><tspan x="0" y="78" font-family="HiraginoSans-W3, Hiragino Sans">めます。忙しい診療の合間でも、有益な</tspan><tspan x="0" y="110" font-family="HiraginoSans-W3, Hiragino Sans">情報が効率よく得られるのが良いです</tspan><tspan x="0" y="142" font-family="HiraginoSans-W3, Hiragino Sans">ね。</tspan></text>
        <text id="忙しい医師を支える効率的な情報収集" transform="translate(466 10332)" fill="#b5002b" font-size="16" font-family="HiraginoSans-W3, Hiragino Sans" letter-spacing="0.05em"><tspan x="0" y="14">忙しい医師を支える効率的な情報収集</tspan></text>
      </g>
